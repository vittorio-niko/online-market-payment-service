apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-db
  labels:
    app: payment-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: payment-db
    spec:
      hostname: payment-db
      containers:
        - name: payment-mongodb
          image: mongo:6.0
          args:
            - bash
            - -c
            - |2
                if [ ! -f /data/db/mongodb.key ]; then
                  openssl rand -base64 756 > /data/db/mongodb.key
                  chmod 400 /data/db/mongodb.key
                  chown 999:999 /data/db/mongodb.key
                fi
                exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/db/mongodb.key
          envFrom:
            - secretRef:
                name: payment-db-secret
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 20
            periodSeconds: 10
          ports:
            - containerPort: 27017
          resources:
            limits:
              memory: 1Gi
            requests:
              memory: 512Mi
          volumeMounts:
            - mountPath: /data/db
              name: payment-mongodb-data
      restartPolicy: Always
      volumes:
        - name: payment-mongodb-data
          persistentVolumeClaim:
            claimName: payment-pvc