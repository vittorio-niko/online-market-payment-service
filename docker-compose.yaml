services:
  payment-db:
    image: mongo:6.0
    container_name: payment-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
    volumes:
      - payment_mongodb_data:/data/db
    command: >
      bash -c "
        if [ ! -f /data/db/mongodb.key ]; then
          openssl rand -base64 756 > /data/db/mongodb.key
          chmod 400 /data/db/mongodb.key
          chown 999:999 /data/db/mongodb.key
        fi
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/db/mongodb.key
      "
    ports:
      - "27017:27017"
    healthcheck:
      test: mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local_market_net

  db-setup:
    image: mongo:6.0
    depends_on:
      payment-db:
        condition: service_healthy
    entrypoint: >
      mongosh --host payment-db -u ${MONGO_USER} -p ${MONGO_PASS} --authenticationDatabase admin --eval 
      'try {
        rs.initiate({
          _id: "rs0",
          members: [{ _id: 0, host: "payment-db:27017" }]
        });
        console.log("Replica Set initialized");
      } catch (e) {
        console.log("Already initialized");
      }'
    networks:
      - local_market_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - local_market_net

  payment-service:
    build: .
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT_EXTERNAL}:${PAYMENT_SERVICE_PORT_INTERNAL}"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=${SERVER_PORT}
      - MONGO_DB_URI=${MONGO_DB_URI}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - local_market_net

volumes:
  payment_mongodb_data:

networks:
  local_market_net:
    external: true